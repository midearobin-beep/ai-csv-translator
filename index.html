<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI CSV 翻译工具</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>AI CSV 翻译工具</h1>
            <p class="subtitle">基于 AI 大模型的 CSV 批量翻译工具</p>
            <button class="lang-toggle" id="langToggle" onclick="toggleLang()">EN</button>
        </header>

        <!-- 文件上传 -->
        <section class="card upload-section">
            <h2>上传 CSV 文件</h2>
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📁</div>
                <p>点击选择文件或拖拽文件到此处</p>
                <p class="upload-hint">支持 .csv 格式 (UTF-8 编码)</p>
                <input type="file" id="fileInput" accept=".csv" hidden>
            </div>
            <div class="file-info" id="fileInfo" style="display: none;">
                <span class="file-name" id="fileName"></span>
                <span class="file-stats" id="fileStats"></span>
                <button class="btn-remove" onclick="removeFile()">×</button>
            </div>
        </section>

        <!-- 源语言设置 -->
        <section class="card source-lang-section">
            <h2>源语言</h2>
            <div class="form-group">
                <label for="sourceLang">请选择 CSV 第一列的语言:</label>
                <select id="sourceLang">
                    <option value="zh">中文</option>
                    <option value="en" selected>English (英文)</option>
                    <option value="es">Español (西班牙语)</option>
                    <option value="de">Deutsch (德语)</option>
                    <option value="fr">Français (法语)</option>
                    <option value="ja">日本語 (日语)</option>
                    <option value="ko">한국어 (韩语)</option>
                    <option value="ru">Русский (俄语)</option>
                    <option value="auto">自动检测</option>
                </select>
            </div>
        </section>

        <!-- 目标语言选择 -->
        <section class="card target-lang-section">
            <h2>选择目标语言</h2>
            <div class="language-grid" id="languageGrid">
                <!-- 语言标签将通过 JS 生成 -->
            </div>
            <div class="selected-info">
                已选择: <span id="selectedCount">0</span> 种语言
            </div>
        </section>

        <!-- 进阶功能 -->
        <section class="card advanced-section">
            <div class="section-header" onclick="toggleSection('advanced')">
                <h2>进阶功能</h2>
                <span class="toggle-icon" id="advanced-toggle">▼</span>
            </div>
            <div class="section-content" id="advanced-content">
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="enableLengthControl">
                        <span>启用字符长度控制</span>
                    </label>
                    <p class="hint">开启后，翻译结果字符数将控制在源文本长度的一定倍率以内。💡 尤其适合多语言 UI 开发，保持界面一致性</p>
                </div>

                <div class="form-group length-control-options" id="lengthControlOptions" style="display: none;">
                    <label>长度倍率:</label>
                    <div class="ratio-buttons">
                        <label class="ratio-btn">
                            <input type="radio" name="lengthRatio" value="1.0">
                            <span>1.0x</span>
                        </label>
                        <label class="ratio-btn">
                            <input type="radio" name="lengthRatio" value="1.1">
                            <span>1.1x</span>
                        </label>
                        <label class="ratio-btn">
                            <input type="radio" name="lengthRatio" value="1.2" checked>
                            <span>1.2x</span>
                        </label>
                        <label class="ratio-btn">
                            <input type="radio" name="lengthRatio" value="1.3">
                            <span>1.3x</span>
                        </label>
                        <label class="ratio-btn">
                            <input type="radio" name="lengthRatio" value="1.4">
                            <span>1.4x</span>
                        </label>
                        <label class="ratio-btn">
                            <input type="radio" name="lengthRatio" value="1.5">
                            <span>1.5x</span>
                        </label>
                        <label class="ratio-btn">
                            <input type="radio" name="lengthRatio" value="1.6">
                            <span>1.6x</span>
                        </label>
                        <label class="ratio-btn">
                            <input type="radio" name="lengthRatio" value="1.7">
                            <span>1.7x</span>
                        </label>
                        <label class="ratio-btn">
                            <input type="radio" name="lengthRatio" value="1.8">
                            <span>1.8x</span>
                        </label>
                        <label class="ratio-btn">
                            <input type="radio" name="lengthRatio" value="1.9">
                            <span>1.9x</span>
                        </label>
                        <label class="ratio-btn">
                            <input type="radio" name="lengthRatio" value="2.0">
                            <span>2.0x</span>
                        </label>
                    </div>
                </div>
            </div>
        </section>

        <!-- 预估信息 -->
        <section class="card estimate-section" id="estimateSection" style="display: none;">
            <div class="estimate-info">
                <span class="estimate-icon">⏱️</span>
                <span id="estimateText">预估完成时间: 计算中...</span>
            </div>
        </section>

        <!-- 翻译按钮 -->
        <div class="action-buttons">
            <button class="btn-primary" id="translateBtn" onclick="startTranslation()" disabled>
                开始翻译
            </button>
        </div>

        <!-- 进度条 -->
        <section class="card progress-section" id="progressSection" style="display: none;">
            <h2>翻译进度</h2>
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="progress-text" id="progressText">0%</div>
            <div class="progress-detail" id="progressDetail">正在翻译...</div>
        </section>

        <!-- 预览表格 -->
        <section class="card preview-section" id="previewSection" style="display: none;">
            <h2>数据预览</h2>
            <div class="table-container">
                <table id="previewTable">
                    <thead id="previewHead"></thead>
                    <tbody id="previewBody"></tbody>
                </table>
            </div>
        </section>

        <!-- 翻译结果表格 -->
        <section class="card result-section" id="resultSection" style="display: none;">
            <h2>翻译结果</h2>
            <div class="result-summary" id="resultSummary"></div>
            <div class="table-container">
                <table id="resultTable">
                    <thead id="tableHead"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <div class="action-buttons" id="downloadSection" style="display: none;">
                <button class="btn-primary" onclick="downloadCSV()">
                    下载翻译后的 CSV
                </button>
            </div>
        </section>

        <!-- API 设置 (移到底部) -->
        <section class="card settings-section" id="settingsSection">
            <div class="section-header" onclick="toggleSection('settings')">
                <h2>API 设置</h2>
                <span class="toggle-icon" id="settings-toggle">▼</span>
            </div>
            <div class="section-content collapsed" id="settings-content">
                <div class="form-group">
                    <label>API 类型</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="apiType" value="deepseek" checked>
                            <span>DeepSeek</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="apiType" value="openai">
                            <span>OpenAI 兼容</span>
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="apiKey">API Key <span class="required">*必填</span></label>
                    <div class="password-input-wrapper">
                        <input type="password" id="apiKey" placeholder="请输入 API Key">
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            <span id="eyeIcon">👁️</span>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="apiBase">Base URL</label>
                    <input type="text" id="apiBase" placeholder="https://api.deepseek.com">
                </div>

                <div class="form-group">
                    <label for="modelName">模型名称</label>
                    <div class="model-select-wrapper">
                        <select id="modelSelect">
                            <option value="">--</option>
                        </select>
                        <input type="text" id="modelName" placeholder="deepseek-chat">
                    </div>
                    <button class="btn-test" id="testApiBtn" onclick="testApi()">测试 API</button>
                    <p class="test-result" id="testResult"></p>
                </div>
            </div>
        </section>

        <!-- 错误提示 -->
        <div class="error-toast" id="errorToast" style="display: none;">
            <span id="errorMessage"></span>
            <button onclick="closeError()">×</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
